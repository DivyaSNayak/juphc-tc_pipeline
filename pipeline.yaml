apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  tasks:
    - name: npminstall
      taskRef:
        name: npminstall

    - name: tests
      taskRef:
        name: jasmine
      runAfter:
        - npminstall

    - name: build
      taskRef:
        name: npminstall
      runAfter:
        - tests
